services:
  coderag:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./indexes:/app/indexes
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: coderag
      POSTGRES_PASSWORD: coderag1234
      POSTGRES_DB: coderag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata: